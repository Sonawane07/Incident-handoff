<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Incident Handoff</title>
<!-- Google Fonts: Manrope & Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#dbc2b0",
                        "on-primary-fixed-variant": "#6e3900",
                        "on-error-container": "#93000a",
                        "secondary-container": "#eae1da",
                        "surface-container-highest": "#e8e1db",
                        "on-surface-variant": "#554336",
                        "tertiary": "#a23917",
                        "surface-container-high": "#eee7e0",
                        "inverse-primary": "#ffb77d",
                        "on-tertiary-fixed": "#3a0a00",
                        "on-tertiary-fixed-variant": "#842503",
                        "tertiary-fixed": "#ffdbd1",
                        "surface-container": "#f4ede6",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "outline": "#887364",
                        "on-background": "#1e1b17",
                        "primary-fixed": "#ffdcc3",
                        "primary-fixed-dim": "#ffb77d",
                        "surface-dim": "#e0d9d2",
                        "surface-container-low": "#faf2eb",
                        "background": "#fff8f2",
                        "tertiary-container": "#c2512d",
                        "tertiary-fixed-dim": "#ffb59f",
                        "inverse-on-surface": "#f7efe9",
                        "primary-container": "#b15f00",
                        "error": "#ba1a1a",
                        "on-surface": "#1e1b17",
                        "on-secondary-fixed": "#1f1b17",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#fff8f2",
                        "on-secondary-container": "#6a635e",
                        "on-secondary-fixed-variant": "#4b4641",
                        "secondary": "#645d58",
                        "surface-bright": "#fff8f2",
                        "on-tertiary-container": "#fffbff",
                        "on-primary-container": "#fffbff",
                        "surface-tint": "#904d00",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#cec5bf",
                        "secondary-fixed": "#eae1da",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "inverse-surface": "#33302c",
                        "surface-variant": "#e8e1db",
                        "primary": "#8d4b00",
                        "on-primary-fixed": "#2f1500"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, .brand-text {
            font-family: 'Manrope', sans-serif;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #8d4b00 0%, #b15f00 100%);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-6">
<!-- Login Container -->
<div class="w-full max-w-md">
<!-- Brand Identity -->
<div class="text-center mb-10">
<div class="flex justify-center mb-4">
<div class="w-12 h-12 bg-primary-container rounded-lg flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined text-3xl" data-icon="shield_with_heart" style="font-variation-settings: 'FILL' 1;">shield_with_heart</span>
</div>
</div>
<h1 class="brand-text text-3xl font-extrabold tracking-tight text-on-surface">Incident Handoff</h1>
<p class="font-label text-sm uppercase tracking-[0.15em] text-on-surface-variant mt-1 opacity-80">The Serene Sentinel</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-lg shadow-[0px_12px_32px_rgba(85,67,54,0.08)] p-8 md:p-10">
<header class="mb-8">
<h2 class="text-2xl font-bold text-on-surface tracking-tight">Welcome back</h2>
<p class="text-on-surface-variant text-sm mt-2">Manage your system's heartbeat with clarity.</p>
</header>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-t-lg transition-all text-on-surface placeholder:text-outline/60" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-center">
<label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-medium text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-xl" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-t-lg transition-all text-on-surface placeholder:text-outline/60" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full btn-gradient text-on-primary font-bold py-3.5 rounded-lg shadow-md hover:opacity-95 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Social Login / Secondary Option -->
<div class="mt-8 pt-8 border-t border-outline-variant/20">
<p class="text-center text-sm text-on-surface-variant">
                    New to the sanctuary? 
                    <a class="text-primary font-semibold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- Footnote -->
<footer class="mt-12 text-center text-xs text-on-surface-variant/60 font-medium">
<div class="flex justify-center gap-6 mb-4">
<a class="hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-on-surface transition-colors" href="#">Terms of Service</a>
<a class="hover:text-on-surface transition-colors" href="#">Status</a>
</div>
<p>© 2024 Incident Handoff. All systems operational.</p>
</footer>
</div>
<!-- Decorative Element: Subtle Warm Glow in background -->
<div class="fixed top-0 right-0 -z-10 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-0 left-0 -z-10 w-[400px] h-[400px] bg-tertiary/5 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
